<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JACK NUTRITION</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">JACK NUTRITION</a>
                <div class="header-actions">
                    <button id="searchToggle" class="icon-btn" aria-label="Поиск">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                    <button id="barcodeToggle" class="icon-btn" aria-label="Сканировать штрих-код" title="Сканировать штрих-код">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M3 5v14"></path>
                            <path d="M7 5v14"></path>
                            <path d="M11 5v14"></path>
                            <path d="M15 5v14"></path>
                            <path d="M19 5v14"></path>
                            <path d="M21 5v14"></path>
                        </svg>
                    </button>
                    <button id="filterToggle" class="icon-btn" aria-label="Фильтры">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"></path>
                        </svg>
                    </button>
                    <button id="cartBtn" class="cart-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span id="cartCount" class="cart-count">0</span>
                    </button>
                    <button id="themeToggle" class="icon-btn" aria-label="Тема">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div id="searchBar" class="search-bar hidden">
                <input type="text" id="searchInput" placeholder="Поиск по названию и бренду...">
                <button id="searchClear" class="icon-btn">&times;</button>
            </div>

            <div id="barcodeScanner" class="barcode-scanner hidden">
                <button id="closeScannerX" class="scanner-close" aria-label="Закрыть сканер">&times;</button>
                <video id="scannerVideo" playsinline muted autoplay></video>
                <div class="scanner-overlay">
                    <div class="scanner-frame"></div>
                </div>
                <div class="scanner-tools">
                    <button id="scannerModeToggle" class="scanner-mode-toggle" aria-label="Ручной ввод" title="Ручной ввод">⌨️</button>
                    <button id="flashToggle" class="scanner-flash" aria-label="Вспышка" title="Вспышка">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
                            <path d="M13 2 4 14h7l-1 8 9-12h-7l1-8z"></path>
                        </svg>
                    </button>
                    <button id="zoomToggle" class="scanner-zoom" aria-label="Зум" title="Зум">1×</button>
                </div>
                <div id="scannerManual" class="scanner-manual hidden">
                    <input type="text" id="manualBarcodeInput" placeholder="Введите штрих-код..." autocomplete="off">
                    <button id="manualBarcodeSubmit" class="scanner-manual-btn">Найти</button>
                </div>
            </div>

            <div id="filterModal" class="modal hidden">
                <div class="modal-content filter-modal-content">
                    <button class="modal-close" id="filterModalClose">&times;</button>
                    <h2>Фильтры</h2>
                    <div class="filters">
                        <div class="filter-group">
                            <label>Категория</label>
                            <select id="categoryFilter">
                                <option value="">Все</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Бренд</label>
                            <select id="brandFilter">
                                <option value="">Все</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Цена от</label>
                            <input type="number" id="priceFrom" placeholder="0">
                        </div>
                        <div class="filter-group">
                            <label>Цена до</label>
                            <input type="number" id="priceTo" placeholder="∞">
                        </div>
                        <div class="filter-group">
                            <label>Сортировка</label>
                            <select id="sortFilter">
                                <option value="newest">По новизне</option>
                                <option value="price-asc">Цена по возр.</option>
                                <option value="price-desc">Цена по убыв.</option>
                                <option value="name">По названию</option>
                            </select>
                        </div>
                    </div>
                    <div class="filter-actions">
                        <button id="resetFilters" class="btn btn-secondary">Сбросить</button>
                        <button id="applyFilters" class="btn btn-primary">Применить</button>
                    </div>
                </div>
            </div>

            <div id="catalog" class="catalog">
                <!-- Products will be rendered here -->
            </div>

            <div id="loading" class="loading hidden">Загрузка...</div>
            <div id="error" class="error hidden"></div>
        </div>
    </main>

    <div id="productModal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="cartModal" class="modal hidden">
        <div class="modal-content cart-modal-content">
            <button class="modal-close">&times;</button>
            <h2>Корзина</h2>
            <div id="cartItems"></div>
            <div class="cart-total">
                <span>Итого:</span>
                <span id="cartTotal">0 ₽</span>
            </div>
            <button id="checkoutBtn" class="btn btn-primary btn-block">Оформить заказ</button>
            <div id="orderTimeMessage" class="order-time-message hidden"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
